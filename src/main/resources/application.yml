spring:
  application:
    name: portfolio-ai-rag
  main:
    web-application-type: servlet

  profiles:
    active: local

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: rag-async-

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true

rag:
  embedding:
    chunk-size: 512
    chunk-overlap: 50
    top-k: 3
    min-score: 0.3
  upload:
    dir: ${RAG_UPLOAD_DIR:/tmp/rag-uploads}

logging:
  level:
    com.simon.rag: DEBUG
    dev.langchain4j: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
