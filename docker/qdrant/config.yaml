# AI Resume RAG Assistant

  > An intelligent personal knowledge assistant built with **Java 17 + Spring Boot 3 + langchain4j + Qdrant**, enabling interviewers to have real conversations with my 7-year engineering experience.
  
  **Live Demo**: [https://yourname.com/ai-chat](https://yourname.com)
  **Tech Stack**: Java · Spring Boot · langchain4j · Qdrant · Redis · MySQL · Docker · AWS

---

## What is this?

  Instead of reading a static resume, interviewers can **chat directly with my AI assistant** — which has been trained on my project experiences, technical notes, and code samples accumulated over 7 years of engineering work.

Ask it things like:
  - *"Tell me about your experience with high-concurrency systems"*
  - *"How did you use Redis in your projects?"*
  - *"What's your approach to database optimization?"*

---

## Architecture

  ```
  ┌─────────────────────────────────────────────────┐
  │              Ingestion Pipeline (offline)        │
  │  PDF/MD/Code → Tika → Chunker → Embed → Qdrant  │
  └─────────────────────────────────────────────────┘
  │ shared vector store
  ┌─────────────────────────────────────────────────┐
  │              Query Pipeline (real-time)          │
  │  Question → Embed → Qdrant search → LLM → Answer │
  └─────────────────────────────────────────────────┘

Infrastructure: Docker Compose · Redis cache · MySQL · JWT RBAC · GitHub Actions CI/CD
  ```
  
  > Full architecture diagram: [docs/architecture/](./docs/architecture/)

---

## Key Features

  | Feature | Implementation |
  |---|---|
  | RAG pipeline | langchain4j + Qdrant HNSW index |
  | Hybrid search | BM25 keyword + vector semantic, RRF fusion |
  | Auth & RBAC | JWT + Spring Security (interviewer / admin roles) |
  | Rate limiting | Redis sliding window (10 req/min per IP) |
  | Caching | Redis — identical queries skip LLM call |
  | Async processing | @Async document ingestion + SSE progress |
  | Fallback | OpenAI timeout → Ollama local model |
  | Observability | Spring Actuator + structured logging |

