# ================================================================
# Production profile — ALL secrets come from environment variables.
# Never hardcode credentials here. This file is safe to commit.
# ================================================================

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/rag_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.yourname.rag.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    # No stdout logging in prod — use structured logs only
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# langchain4j — prod uses OpenAI
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    embedding-model-name: text-embedding-3-small
    chat-model-name: gpt-3.5-turbo
    timeout: 30s
    max-retries: 3

# Qdrant — prod Docker container (no public port exposed, internal network only)
qdrant:
  host: ${QDRANT_HOST:qdrant}
  port: 6334
  collection-name: rag_knowledge
  api-key: ${QDRANT_API_KEY:}

logging:
  level:
    com.yourname.rag: INFO
    dev.langchain4j: WARN
  file:
    name: /var/log/rag/app.log