worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 60M;

    # SSE requires chunked transfer — disable buffering for streaming responses
    proxy_buffering off;

    # Upstream Spring Boot app
    upstream app {
        server app:8080;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/ccbillow.github.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ccbillow.github.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Frontend static files
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback — all non-asset routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API reverse proxy
        location /api/ {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            # Append real client IP to X-Forwarded-For chain
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
        }

        # SSE endpoint — long-lived connection, extended timeout, no buffering
        location /api/chat/stream {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;

            # Required SSE headers
            add_header Cache-Control no-cache;
            add_header X-Accel-Buffering no;
        }

        # Health check — no logging noise
        location /actuator/health {
            proxy_pass http://app;
            access_log off;
        }
    }
}
