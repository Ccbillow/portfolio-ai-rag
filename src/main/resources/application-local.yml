spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rag_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:ragdev123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          min-idle: 2

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.simon.rag.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    embedding-model-name: text-embedding-3-small
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    chat-model-name: claude-haiku-4-5-20251001
    max-tokens: 512

qdrant:
  host: localhost
  port: 6334
  http-port: 6333
  collection-name: rag_knowledge
  vector-size: 1536

cors:
  allowed-origins: "http://localhost:*"

logging:
  level:
    com.simon.rag: DEBUG
    dev.langchain4j: INFO
