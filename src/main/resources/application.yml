spring:
  application:
    name: portfolio-ai-rag
  main:
    web-application-type: servlet


  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: rag-async-

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration-hours: 24

cohere:
  api-key: ${COHERE_API_KEY:}

rag:
  companies:
    - Alipay
    - Sinosig
    - NetEase
    - Deloitte
    - OCBC
    - Sanofi
  company-subgroups:
    Deloitte:
      - OCBC
      - Sanofi
  embedding:
    chunk-size: 1000
    chunk-overlap: 150
    top-k: 4
    min-score: 0.25
  upload:
    dir: ${RAG_UPLOAD_DIR:/tmp/rag-uploads}
  cache:
    enabled: false   # enable in production after Phase 5 search quality is finalized
  hybrid-search:
    enabled: true
  contextual-retrieval:
    enabled: false
    max-doc-chars: 12000
    concurrency: 3
    rate-limit-ms: 6000
  raptor:
    enabled: true
    max-doc-chars: 12000
  multi-query:
    enabled: false
  rate-limit:
    enabled: true
  reranker:
    enabled: true
    candidate-k: 10
    top-n: 5
    model: rerank-v3.5
    ttl-hours: 24
    min-rerank-score: 0.18

logging:
  level:
    com.simon.rag: DEBUG
    dev.langchain4j: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
