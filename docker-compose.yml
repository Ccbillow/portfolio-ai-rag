version: "3.9"

# ================================================================
# Local development stack — starts all 4 services with one command:
#   docker-compose up -d
#
# Then run Spring Boot separately in IDEA with profile=dev.
# ================================================================

networks:
  rag-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  qdrant-data:

services:

  # ------------------------------------------------------------
  # MySQL 8 — relational metadata store
  # ------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-ragdev123}
      MYSQL_DATABASE: rag_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-ragdev123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------
  # Redis 7 — cache + rate limiting + task status
  # ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ------------------------------------------------------------
  # Qdrant — vector database (hybrid search built-in)
  # ------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST API (browser UI: http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC (used by langchain4j Java client)
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ------------------------------------------------------------
  # Spring Boot App — only used for docker-compose.prod.yml
  # In dev, run from IDEA instead (faster hot-reload)
  # Uncomment this block when doing prod-like local testing.
  # ------------------------------------------------------------
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: rag-app
  #   restart: unless-stopped
  #   environment:
  #     SPRING_PROFILES_ACTIVE: dev
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ragdev123}
  #     REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod-min-32-chars}
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_healthy
  #   networks:
  #     - rag-net