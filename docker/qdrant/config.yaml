## Tech Decisions

  **Why Qdrant over pgvector?** Native hybrid search (BM25 + vector), Docker-native, langchain4j first-class support, no PostgreSQL extension complexity.
  
  **Why langchain4j over LangChain (Python)?** Java-native, type-safe, integrates directly with Spring Boot — no cross-language bridge needed.
  
  **Why Ollama for dev?** Zero API cost during development. Same langchain4j interface, one config line to switch to OpenAI in prod.

