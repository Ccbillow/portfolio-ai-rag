spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/rag_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 16
          min-idle: 2

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.simon.rag.domain.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY}
    embedding-model-name: text-embedding-3-small
    max-retries: 3
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    chat-model-name: claude-haiku-4-5-20251001
    max-tokens: 180

qdrant:
  host: ${QDRANT_HOST:qdrant}
  port: 6334
  http-port: 6333
  collection-name: rag_knowledge
  vector-size: 1536
  api-key: ${QDRANT_API_KEY:}

cors:
  allowed-origins: "https://ccbillow.github.io"

logging:
  level:
    com.simon.rag: INFO
    dev.langchain4j: WARN
  file:
    name: /var/log/rag/app.log
