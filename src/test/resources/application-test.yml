spring:
  datasource:
    url: jdbc:h2:mem:rag_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.simon.rag.domain.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rag:
  jwt:
    secret: test-secret-at-least-32-characters-long
    expiration: 3600

logging:
  level:
    com.simon.rag: WARN
    dev.langchain4j: WARN
